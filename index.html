<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>麦麦终极七色贪吃蛇·走马灯边框</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#000;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.game{width:100vw;max-width:420px}
#score{text-align:center;font-size:22px;padding:10px;color:#fff;text-shadow:0 0 10px #fff}

/* 走马灯流光外框 */
.border-wrap {
  position: relative;
  width: 400px;
  height: 400px;
  margin: 0 auto;
  border-radius: 12px;
  padding: 3px;
  background: linear-gradient(90deg, #ff0000, #ff8800, #ffff00, #00ff00, #00ffff, #0088ff, #aa00ff, #ff0000);
  background-size: 400% 100%;
  animation: borderFlow 3s linear infinite;
}
#board{
  display:block;
  width: 100%;
  height: 100%;
  background:#000;
  border-radius: 10px;
}
@keyframes borderFlow {
  0%{background-position:0% 50%}
  100%{background-position:400% 50%}
}

/* 超大十字方向键 */
.controls{display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:10px}
.dpad{display:grid;grid-template-columns:80px 80px 80px;gap:10px}
.btn{width:100%;height:70px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;background:#111;color:#fff;border:2px solid #ff0;border-radius:16px;box-shadow:0 0 12px #ff0}
.btn:active{background:#ff0;color:#000}
#up{grid-column:2}
#left{grid-column:1}
#right{grid-column:3}
#down{grid-column:2}
.func{display:flex;gap:15px;margin-top:5px}
.func .btn{width:100px;height:50px;font-size:18px}
</style>
</head>
<body>
<div class="game">
  <div id="score">分数: 0</div>
  <div class="border-wrap">
    <canvas id="board" width="400" height="400"></canvas>
  </div>
  <div class="controls">
    <div class="dpad">
      <div class="btn" id="up">↑</div>
      <div class="btn" id="left">←</div>
      <div class="btn" id="right">→</div>
      <div class="btn" id="down">↓</div>
    </div>
    <div class="func">
      <div class="btn" id="start">开始</div>
      <div class="btn" id="reset">重启</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const size = 20;
const count = 20;
let speed = 500;

let snake = [{x:10,y:10}];
let food = {x:15,y:15};
let dx=0, dy=0;
let gameRunning = false;
let score = 0;

// 从第2段开始：红 橙 黄 绿 青 蓝 紫
const colors = [
  '#ff0000','#ff8800','#ffff00',
  '#00ff00','#00ffff','#0088ff','#aa00ff'
];

function rand(){return Math.floor(Math.random()*count)}
function newFood(){
  let f;
  do{f={x:rand(),y:rand()}}while(snake.some(s=>s.x==f.x&&s.y==f.y));
  food=f;
}

function draw(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 食物：纯白色荧光
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 22;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(food.x*size, food.y*size, size-2, size-2);
  ctx.shadowBlur = 0;

  // 先画后面的身体（第2段开始）
  for(let i=1; i<snake.length; i++){
    const c = colors[(i-1)%colors.length];
    ctx.shadowColor = c;
    ctx.shadowBlur = 18;
    ctx.fillStyle = c;
    ctx.fillRect(snake[i].x*size, snake[i].y*size, size-2, size-2);
  }

  // 最后画头部：浅粉色，永远在最上层，不变色
  ctx.shadowColor = '#ffb6c1';
  ctx.shadowBlur = 22;
  ctx.fillStyle = '#ffb6c1';
  ctx.fillRect(snake[0].x*size, snake[0].y*size, size-2, size-2);
  ctx.shadowBlur = 0;
}

function update(){
  if(!gameRunning)return;
  const head={x:snake[0].x+dx, y:snake[0].y+dy};

  // 无敌穿墙
  head.x = (head.x + count) % count;
  head.y = (head.y + count) % count;

  snake.unshift(head);

  if(head.x==food.x&&head.y==food.y){
    score += 10;
    document.getElementById('score').textContent='分数: '+score;
    newFood();
  }else{
    snake.pop();
  }
  draw();
}

document.getElementById('start').onclick=()=>{gameRunning=true};
document.getElementById('reset').onclick=()=>{
  snake=[{x:10,y:10}]; dx=0; dy=0; score=0;
  document.getElementById('score').textContent='分数: 0';
  newFood(); draw();
};

document.getElementById('up').onclick=()=>{if(dy!==1){dx=0;dy=-1}};
document.getElementById('down').onclick=()=>{if(dy!==-1){dx=0;dy=1}};
document.getElementById('left').onclick=()=>{if(dx!==1){dx=-1;dy=0}};
document.getElementById('right').onclick=()=>{if(dx!==-1){dx=1;dy=0}};

newFood();
draw();
setInterval(update,speed);
</script>
</body>
</html>
